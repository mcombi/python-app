schemaVersion: 2.2.0
metadata:
  name: python-dev-environment
  displayName: Python dev environment
  version: 1.0.0
attributes:
  ".vscode/extensions.json": |
    {
      "recommendations": [
        "redhat.vscode-yaml"
      ]
    }
projects:
  - name: python-app
    git:
      remotes:
        origin: https://github.com/mcombi/python-app.git
components:
  - name: git-credentials-storage
    volume:
      size: 1Gi
  - name: python-tools
    container:
      image: quay.io/mcombi/python-dev-spaces:1.0 
      memoryLimit: 1Gi
      memoryRequest: 512Mi
      mountSources: true
      env:
        - name: HOME
          value: /projects
        - name: SHELL
          value: /bin/bash
        - name: GIT_CONFIG_GLOBAL
          value: /git-credentials/gitconfig
      volumeMounts:
        - name: git-credentials-storage
          path: /git-credentials
      command:
        - sleep
        - infinity
      endpoints:
        - name: http-python
          targetPort: 8080
          exposure: public
          protocol: http
